AWSTemplateFormatVersion: '2010-09-09'
Description: 'Sentinel OSINT Dashboard — Production Infrastructure'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, benchmark]

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access

  MapboxToken:
    Type: String
    NoEcho: true
    Description: Mapbox access token for frontend

  AcledApiKey:
    Type: String
    NoEcho: true
    Description: ACLED API key

  AcledEmail:
    Type: String
    Description: ACLED API email

Resources:
  # --- VPC & Networking ---
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: sentinel-vpc

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref RouteTable

  SubnetRouteAssoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref RouteTable

  # --- Security Groups ---
  KafkaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Kafka broker access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 9092
          ToPort: 9092
          CidrIp: 10.0.0.0/16
        - IpProtocol: tcp
          FromPort: 2181
          ToPort: 2181
          CidrIp: 10.0.0.0/16
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  CassandraSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Cassandra access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 9042
          ToPort: 9042
          CidrIp: 10.0.0.0/16
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  # --- Kafka EC2 Instances (3x t3.medium) ---
  KafkaBroker1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.medium
      ImageId: ami-0c02fb55956c7d316  # Amazon Linux 2023
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds: [!Ref KafkaSecurityGroup]
      Tags:
        - Key: Name
          Value: sentinel-kafka-1

  KafkaBroker2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.medium
      ImageId: ami-0c02fb55956c7d316
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds: [!Ref KafkaSecurityGroup]
      Tags:
        - Key: Name
          Value: sentinel-kafka-2

  KafkaBroker3:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.medium
      ImageId: ami-0c02fb55956c7d316
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet2
      SecurityGroupIds: [!Ref KafkaSecurityGroup]
      Tags:
        - Key: Name
          Value: sentinel-kafka-3

  # --- Cassandra EC2 Instance ---
  CassandraNode:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.medium
      ImageId: ami-0c02fb55956c7d316
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds: [!Ref CassandraSecurityGroup]
      Tags:
        - Key: Name
          Value: sentinel-cassandra-1

  # --- S3 Bucket for raw event archive ---
  RawEventsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub sentinel-raw-events-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA

  # --- ECS Cluster for Fargate services ---
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: sentinel-cluster

  # --- ECS Task Definitions ---
  ProcessorTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: sentinel-processor
      Cpu: '1024'
      Memory: '4096'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ContainerDefinitions:
        - Name: processor
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/sentinel-processor:latest
          Essential: true
          Environment:
            - Name: KAFKA_BOOTSTRAP_SERVERS
              Value: !Sub ${KafkaBroker1.PrivateIp}:9092
            - Name: CASSANDRA_HOSTS
              Value: !GetAtt CassandraNode.PrivateIp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/sentinel-processor
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: processor

  ApiTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: sentinel-api
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ContainerDefinitions:
        - Name: api
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/sentinel-api:latest
          Essential: true
          PortMappings:
            - ContainerPort: 8000
          Environment:
            - Name: KAFKA_BOOTSTRAP_SERVERS
              Value: !Sub ${KafkaBroker1.PrivateIp}:9092
            - Name: CASSANDRA_HOSTS
              Value: !GetAtt CassandraNode.PrivateIp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/sentinel-api
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: api

  # --- CloudFront for frontend ---
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub sentinel-frontend-${AWS::AccountId}
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.DomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

Outputs:
  KafkaBroker1IP:
    Value: !GetAtt KafkaBroker1.PublicIp
  CassandraIP:
    Value: !GetAtt CassandraNode.PublicIp
  CloudFrontURL:
    Value: !GetAtt CloudFrontDistribution.DomainName
  S3BucketName:
    Value: !Ref RawEventsBucket
